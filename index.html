<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✿ Girl SNS Manager</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#fff5f8;--bg2:#fff0f5;--surface:#fff;
  --border:#ffd6e4;--border2:#ffb3cc;
  --pink:#ff6b9d;--pink-light:#ffb3cc;--pink-pale:#ffe0ec;
  --lavender:#c084fc;--coral:#ff8fab;
  --text:#3d1f2e;--text-mid:#8b5a70;--text-muted:#c4879a;
  --shadow:0 4px 24px rgba(255,107,157,0.10);
  --font:'M PLUS Rounded 1c',sans-serif;--radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
.layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh;}
@media(max-width:640px){.layout{grid-template-columns:1fr;}}

/* Sidebar */
.sidebar{background:white;border-right:1.5px solid var(--border);padding:16px 10px;position:sticky;top:0;height:100vh;overflow-y:auto;}
@media(max-width:640px){.sidebar{height:auto;position:relative;border-right:none;border-bottom:1.5px solid var(--border);}}
.sidebar-logo{text-align:center;margin-bottom:14px;padding-bottom:12px;border-bottom:1px dashed var(--border);}
.sidebar-logo h1{font-family:'Playfair Display',serif;font-size:14px;background:linear-gradient(135deg,var(--pink),var(--lavender));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sidebar-logo p{font-size:10px;color:var(--text-muted);margin-top:2px;}
.api-side-btn{display:flex;align-items:center;gap:6px;width:100%;padding:8px 10px;background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;font-family:var(--font);font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:12px;transition:all 0.2s;}
.api-side-btn:hover{border-color:var(--pink);color:var(--pink);}
.api-dot{width:8px;height:8px;border-radius:50%;background:#d1d5db;flex-shrink:0;}
.api-dot.set{background:#10b981;box-shadow:0 0 6px rgba(16,185,129,0.5);}
.char-list{display:flex;flex-direction:column;gap:5px;}
@media(max-width:640px){.char-list{flex-direction:row;flex-wrap:wrap;}}
.char-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:11px;border:1.5px solid transparent;cursor:pointer;transition:all 0.18s;}
.char-item:hover{background:var(--pink-pale);border-color:var(--pink-light);}
.char-item.active{background:linear-gradient(135deg,#fff0f8,#f5f0ff);border-color:var(--pink);box-shadow:0 2px 10px rgba(255,107,157,0.15);}
.char-avatar{font-size:20px;flex-shrink:0;}
.char-name{font-size:12px;font-weight:900;color:var(--text);}
.char-tag2{font-size:10px;color:var(--text-muted);}
.char-item.active .char-name{color:var(--pink);}

/* Main */
.main{padding:18px 16px 60px;max-width:740px;}

/* Char header */
.char-header{display:flex;align-items:flex-start;gap:12px;background:white;border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;box-shadow:var(--shadow);}
.ch-avatar{font-size:30px;flex-shrink:0;margin-top:2px;}
.ch-name{font-size:15px;font-weight:900;}
.ch-tag{font-size:11px;color:var(--text-muted);margin-top:1px;}
.ch-profile{font-size:12px;color:var(--text-mid);background:var(--bg2);border-radius:8px;padding:7px 10px;margin-top:7px;line-height:1.6;}
.profile-copy-btn{margin-top:6px;padding:4px 12px;background:var(--pink-pale);border:1.5px solid var(--pink-light);border-radius:20px;font-family:var(--font);font-size:10px;font-weight:700;color:var(--pink);cursor:pointer;transition:all 0.15s;}
.profile-copy-btn:hover{background:var(--pink-light);color:white;}
.profile-copy-btn.copied{background:#10b981;border-color:#10b981;color:white;}

/* Tabs */
.tabs{display:flex;gap:4px;background:white;border:1.5px solid var(--border);border-radius:12px;padding:4px;margin-bottom:14px;width:fit-content;}
.tab-btn{padding:7px 18px;border:none;border-radius:9px;background:transparent;color:var(--text-muted);font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;}
.tab-btn.active{background:linear-gradient(135deg,var(--pink),var(--lavender));color:white;box-shadow:0 2px 8px rgba(255,107,157,0.3);}

/* Gen card */
.gen-card{background:white;border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow);}
.card-title{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:0.08em;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.card-icon{width:20px;height:20px;background:linear-gradient(135deg,var(--pink),var(--lavender));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;}

/* Situations */
.sit-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.sit-chip{font-size:11px;font-weight:700;padding:5px 11px;border-radius:20px;border:1.5px solid var(--border2);background:white;color:var(--text-mid);cursor:pointer;transition:all 0.15s;user-select:none;}
.sit-chip:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(255,107,157,0.12);}
.sit-chip.active{background:linear-gradient(135deg,var(--pink),var(--coral));border-color:var(--pink);color:white;box-shadow:0 2px 10px rgba(255,107,157,0.3);}

/* Adult */
.adult-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.adult-label{font-size:11px;font-weight:700;color:var(--text-muted);white-space:nowrap;}
.adult-chips{display:flex;gap:5px;flex-wrap:wrap;}
.adult-chip{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;border:1.5px solid var(--border);background:white;color:var(--text-muted);cursor:pointer;transition:all 0.15s;user-select:none;}
.adult-chip:hover{border-color:#fb923c;color:#fb923c;}
.adult-chip.active{background:linear-gradient(135deg,#f43f5e,#fb923c);border-color:#f43f5e;color:white;}

/* Topic */
.field-label{font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:5px;}
input.topic-in{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:13px;padding:9px 12px;outline:none;transition:all 0.2s;margin-bottom:12px;}
input.topic-in:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,107,157,0.1);background:white;}

/* Gen buttons */
.gen-btns{display:flex;gap:8px;flex-wrap:wrap;}
.gen-btn{flex:1;min-width:130px;padding:12px;background:linear-gradient(135deg,var(--pink),var(--lavender));border:none;border-radius:12px;color:white;font-family:var(--font);font-size:13px;font-weight:900;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(255,107,157,0.35);}
.gen-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 22px rgba(255,107,157,0.4);}
.gen-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.gen-btn.rand{background:linear-gradient(135deg,var(--lavender),#818cf8);}
.spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;display:none;flex-shrink:0;}
.gen-btn.loading .spinner{display:block;}

/* Results */
.result-area{margin-top:14px;display:none;}
.result-area.show{display:block;}
.result-post{background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:13px;margin-bottom:10px;position:relative;}
.result-post::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--pink),var(--lavender));border-radius:3px 0 0 3px;}
.result-num{font-size:10px;font-weight:900;color:var(--text-muted);margin-bottom:6px;}
.result-text{font-size:14px;line-height:1.8;color:var(--text);white-space:pre-wrap;padding-left:4px;}
.result-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px dashed var(--border);flex-wrap:wrap;gap:6px;}
.rcount{font-size:11px;font-weight:700;color:var(--text-muted);}
.rcount.over{color:#f43f5e;}
.r-actions{display:flex;gap:5px;flex-wrap:wrap;}
.rbtn{padding:5px 11px;border-radius:14px;border:1.5px solid var(--border);background:white;font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;transition:all 0.15s;color:var(--text-mid);}
.rbtn:hover{transform:translateY(-1px);}
.rbtn.copied{background:#10b981;border-color:#10b981;color:white;}
.rbtn.open-x{color:#1d9bf0;border-color:#bfdbfe;}
.rbtn.open-t{color:#8b5cf6;border-color:#ddd6fe;}
.rbtn.use{background:linear-gradient(135deg,var(--pink),var(--lavender));border:none;color:white;box-shadow:0 2px 8px rgba(255,107,157,0.25);}

/* Compose */
.compose-card{background:white;border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow);}
textarea.compose-area{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:var(--font);font-size:14px;line-height:1.7;padding:11px 13px;outline:none;resize:vertical;min-height:90px;transition:all 0.2s;}
textarea.compose-area:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,107,157,0.1);background:white;}
.compose-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px;flex-wrap:wrap;gap:6px;}
.ccount{font-size:11px;font-weight:700;color:var(--text-muted);}
.ccount.over{color:#f43f5e;}
.c-actions{display:flex;gap:6px;flex-wrap:wrap;}
.btn{padding:7px 15px;border-radius:20px;border:1.5px solid var(--border);background:white;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:4px;}
.btn:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(255,107,157,0.12);}
.btn-copy.copied{background:#10b981;border-color:#10b981;color:white;}
.btn-x{color:#1d9bf0;border-color:#bfdbfe;}
.btn-t{color:#8b5cf6;border-color:#ddd6fe;}
.btn-save{background:linear-gradient(135deg,var(--pink),var(--lavender));border:none;color:white;box-shadow:0 3px 12px rgba(255,107,157,0.3);}

/* History */
.hist-section{margin-top:20px;}
.sect-title{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;}
.hist-empty{text-align:center;font-size:13px;color:var(--text-muted);padding:24px;border:1.5px dashed var(--border);border-radius:var(--radius);}
.hist-item{background:white;border:1.5px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:8px;transition:border-color 0.15s;}
.hist-item:hover{border-color:var(--pink-light);}
.hi-meta{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--text-muted);margin-bottom:5px;}
.hi-plat{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;}
.hi-plat.x{background:#e0f0ff;color:#1d9bf0;}
.hi-plat.t{background:#f0e0ff;color:#8b5cf6;}
.hi-text{font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap;}
.hi-acts{display:flex;gap:5px;margin-top:7px;padding-top:7px;border-top:1px dashed var(--border);flex-wrap:wrap;}
.hi-btn{font-size:11px;font-weight:700;padding:3px 11px;border-radius:10px;border:1.5px solid var(--border);background:white;color:var(--text-muted);cursor:pointer;font-family:var(--font);transition:all 0.15s;}
.hi-btn:hover{border-color:var(--pink);color:var(--pink);}
.hi-btn.del:hover{border-color:#f43f5e;color:#f43f5e;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(61,31,46,0.45);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.hidden{display:none;}
.modal-box{background:white;border:1.5px solid var(--border);border-radius:24px;padding:28px 24px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(255,107,157,0.2);text-align:center;}
.m-icon{font-size:30px;margin-bottom:8px;}
.m-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--pink),var(--lavender));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
.m-desc{font-size:12px;color:var(--text-muted);line-height:1.6;margin-bottom:14px;}
.m-desc a{color:var(--pink);text-decoration:none;}
.m-input{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:monospace;font-size:12px;padding:10px 12px;outline:none;margin-bottom:12px;transition:all 0.2s;}
.m-input:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,107,157,0.12);}
.m-save{width:100%;padding:12px;background:linear-gradient(135deg,var(--pink),var(--lavender));border:none;border-radius:12px;color:white;font-family:var(--font);font-size:14px;font-weight:900;cursor:pointer;box-shadow:0 4px 14px rgba(255,107,157,0.35);}
.m-save:hover{transform:translateY(-1px);}
.m-note{font-size:10px;color:var(--text-muted);margin-top:8px;line-height:1.5;}

@keyframes spin{to{transform:rotate(360deg);}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.ani{animation:slideUp 0.3s ease both;}
</style>
</head>

  {name:'れい',avatar:'🐱',tag:'アラサー・内気・猫好き',profile:'ねこと暮らしてるアラサーです🐱 人見知りだけど仲良くなったら普通に喋れます…たぶん。お風呂上がりにぼんやり投稿するのが日課。優しい人と繋がりたいな、ゆっくりでもいいから',pron:'わたし',age:'アラサー女性（27〜33歳）',personality:'内気・恥ずかしがり屋',hobby:'猫・動物・料理',tone:'語尾が伸びる・ふわふわ',hx:'#猫好き #ねこ #アラサー',ht:'#猫好き #ねこのいる生活 #アラサー #料理'},
  {name:'ちか',avatar:'✈️',tag:'大学生・ギャル旅女子',profile:'旅と自分磨きが生きがいの大学生✈️ 知らない街で知らない人と話すのが一番楽しい！Threadsで知り合って実際に会えた人もいるから、縁って面白いよね。フットワーク軽い人大好き🫶',pron:'あーし',age:'大学生（20歳前後）',personality:'明るい・元気・ギャル',hobby:'旅行・インスタ・コスメ',tone:'ギャル語・笑い多め',hx:'#旅行 #インスタ映え #大学生',ht:'#旅行好き #インスタ映え #大学生 #自分磨き'},
  {name:'くるみ',avatar:'📚',tag:'アラサー・文学系',profile:'本と映画と深夜の静けさが好き📚 うまく言葉にできないことを投稿してる。読んでくれてる人のこと、ちゃんと意識してる。いつかどこかで会えたら、それだけでいい気がしてる',pron:'私',age:'アラサー女性（27〜33歳）',personality:'文学少女・感受性豊か',hobby:'読書・映画・韓流',tone:'文学的・ポエミー',hx:'#読書 #映画 #アラサー',ht:'#読書好き #映画好き #アラサー #深夜'}
];

const SITUATIONS=['朝起きたて・おはよう','通勤・通学中','お昼休み・ランチ','仕事・授業中（こっそり）','帰り道・夕方','夜・寝る前','深夜・眠れない','休日・お出かけ','お風呂上がり','飲み会・ちょっと酔い気味','ライブ・現場','ゲーム中','恋してる・ドキドキ','失恋後・センチメンタル','落ち込み中・しんどい','テンション爆上がり','本音・ひとりごと','追い込まれ中'];

const ADULTS=[
  {label:'Lv1 匂わせ',val:'ちょっとドキドキ・匂わせ程度（際どくない・健全寄り）'},
  {label:'Lv2 色気',val:'セクシー・大人っぽい色気を出す（過激表現なし）'},
  {label:'Lv3 官能的',val:'官能的・エロい雰囲気を強く出す（直接的表現あり）'},
  {label:'Lv4 直接的',val:'かなりエッチ・直接的でエロい表現を使う（成人向け）'},
  {label:'Lv5 過激',val:'超過激・露骨な表現（完全成人向け）'}
];

let API_KEY='';
let cur=0, plat='threads', selSit='', selAdult='';
let histories=CHARS.map(()=>[]);
let genPosts=[];

function saveApiKey(){
  const v=document.getElementById('apiKeyInput').value.trim();
  if(!v.startsWith('sk-')){alert('APIキーは sk- から始まります');return;}
  API_KEY=v;
  document.getElementById('apiModal').classList.add('hidden');
  document.getElementById('apiDot').classList.add('set');
  document.getElementById('apiStatus').textContent='APIキー設定済み ✓';
}
document.getElementById('apiKeyInput').addEventListener('keydown',e=>{if(e.key==='Enter')saveApiKey();});

function renderSidebar(){
  document.getElementById('charList').innerHTML=CHARS.map((c,i)=>`
    <div class="char-item ${i===cur?'active':''}" onclick="selChar(${i})">
      <div class="char-avatar">${c.avatar}</div>
      <div><div class="char-name">${c.name}</div><div class="char-tag2">${c.tag.split('・')[0]}</div></div>
    </div>`).join('');
}

function renderMain(){
  const c=CHARS[cur];
  const lim=plat==='x'?140:500;
  document.getElementById('mainArea').innerHTML=`
    <div class="char-header ani">
      <div class="ch-avatar">${c.avatar}</div>
      <div style="flex:1">
        <div class="ch-name">${c.name}</div>
        <div class="ch-tag">${c.tag}</div>
        <div class="ch-profile">${c.profile}</div>
        <button class="profile-copy-btn" id="profBtn" onclick="copyProfile()">📋 プロフィールをコピー</button>
      </div>
    </div>

    <div class="tabs ani">
      <button class="tab-btn ${plat==='threads'?'active':''}" onclick="setPl('threads')">⊕ Threads</button>
      <button class="tab-btn ${plat==='x'?'active':''}" onclick="setPl('x')">𝕏 X</button>
    </div>

    <div class="gen-card ani">
      <div class="card-title"><div class="card-icon">✨</div>AI文章生成</div>
      <div class="field-label">シチュエーション（選択 or 未選択でランダム）</div>
      <div class="sit-grid">
        ${SITUATIONS.map(s=>`<div class="sit-chip ${selSit===s?'active':''}" onclick="togSit('${s}')">${s}</div>`).join('')}
      </div>
      <div class="adult-row">
        <div class="adult-label">🔥 アダルト度：</div>
        <div class="adult-chips">
          <div class="adult-chip ${selAdult===''?'active':''}" onclick="setAdult('')">なし</div>
          ${ADULTS.map(a=>`<div class="adult-chip ${selAdult===a.val?'active':''}" onclick="setAdult('${esc(a.val)}')">${a.label}</div>`).join('')}
        </div>
      </div>
      <div class="field-label">テーマ・補足（任意）</div>
      <input class="topic-in" type="text" id="topicIn" placeholder="例: 今日の出来事、伝えたいことなど（空欄でもOK）"/>
      <div class="gen-btns">
        <button class="gen-btn" id="genBtn" onclick="doGen(false)">
          <div class="spinner"></div>
          <span>${selSit?'✦ '+selSit.split('・')[0]+'で生成':'✦ 生成する'}</span>
        </button>
        <button class="gen-btn rand" id="randBtn" onclick="doGen(true)">
          <div class="spinner"></div>
          <span>🎲 ランダム生成</span>
        </button>
      </div>
      <div class="result-area ${genPosts.length?'show':''}" id="resultArea">${renderResults()}</div>
    </div>

    <div class="compose-card ani">
      <div class="card-title"><div class="card-icon">✏️</div>手動で入力・編集</div>
      <textarea class="compose-area" id="compArea" oninput="updCount()" rows="4" placeholder="${c.name}として投稿する文章を入力..."></textarea>
      <div class="compose-foot">
        <div class="ccount" id="ccount">0 / ${lim}文字</div>
        <div class="c-actions">
          <button class="btn btn-copy" id="copyBtn" onclick="copyPost()">📋 コピー</button>
          ${plat==='x'
            ?`<button class="btn btn-x" onclick="openX()">𝕏 Xで開く</button>`
            :`<a class="btn btn-t" href="https://www.threads.net/" target="_blank" rel="noopener">⊕ Threadsを開く</a>`}
          <button class="btn btn-save" onclick="savePost()">✓ 履歴保存</button>
        </div>
      </div>
    </div>

    <div class="hist-section ani">
      <div class="sect-title">📝 ${c.name} の投稿履歴（${histories[cur].length}件）</div>
      <div id="histList"></div>
    </div>`;
  renderHist();
}

function renderResults(){
  if(!genPosts.length)return'';
  const lim=plat==='x'?140:500;
  return genPosts.map((text,i)=>{
    const over=text.length>lim;
    const enc=encodeURIComponent(text);
    const href=plat==='x'?`https://twitter.com/intent/tweet?text=${enc}`:`https://www.threads.net/`;
    return `<div class="result-post">
      <div class="result-num">✦ パターン ${i+1}</div>
      <div class="result-text">${escH(text)}</div>
      <div class="result-foot">
        <div class="rcount ${over?'over':''}">${text.length} / ${lim}文字</div>
        <div class="r-actions">
          <button class="rbtn" onclick="cpRes(this,${i})">📋 コピー</button>
          <a class="rbtn ${plat==='x'?'open-x':'open-t'}" href="${href}" target="_blank" rel="noopener">${plat==='x'?'𝕏 Xで開く':'⊕ Threadsを開く'}</a>
          <button class="rbtn use" onclick="useRes(${i})">✏️ 編集へ</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderHist(){
  const el=document.getElementById('histList');if(!el)return;
  const h=histories[cur];
  if(!h.length){el.innerHTML='<div class="hist-empty">まだ投稿履歴がありません</div>';return;}
  el.innerHTML=[...h].reverse().map((item,ri)=>{
    const i=h.length-1-ri;
    const enc=encodeURIComponent(item.text);
    const href=item.platform==='x'?`https://twitter.com/intent/tweet?text=${enc}`:`https://www.threads.net/`;
    return`<div class="hist-item ani">
      <div class="hi-meta">
        <span class="hi-plat ${item.platform}">${item.platform==='x'?'𝕏 X':'⊕ Threads'}</span>
        <span>${item.date}</span><span>${item.text.length}文字</span>
      </div>
      <div class="hi-text">${escH(item.text)}</div>
      <div class="hi-acts">
        <button class="hi-btn" onclick="reuseP(${i})">↩ 再利用</button>
        <button class="hi-btn" onclick="cpHist(${i})">📋 コピー</button>
        <a class="hi-btn" href="${href}" target="_blank" rel="noopener">${item.platform==='x'?'𝕏 Xで開く':'⊕ Threadsを開く'}</a>
        <button class="hi-btn del" onclick="delP(${i})">🗑 削除</button>
      </div>
    </div>`;
  }).join('');
}

async function doGen(isRand){
  if(!API_KEY){document.getElementById('apiModal').classList.remove('hidden');return;}
  const c=CHARS[cur];
  const lim=plat==='x'?140:500;
  const topic=document.getElementById('topicIn')?.value.trim()||'';
  const sit=isRand?SITUATIONS[Math.floor(Math.random()*SITUATIONS.length)]:(selSit||SITUATIONS[Math.floor(Math.random()*SITUATIONS.length)]);
  const [g,r]=[document.getElementById('genBtn'),document.getElementById('randBtn')];
  [g,r].forEach(b=>{b.disabled=true;b.classList.add('loading');});

  const isAdult=!!selAdult;
  const sys=isAdult
    ?`あなたは成人向けSNS投稿文の生成AIです。ユーザーは18歳以上の成人です。指定キャラになりきりリアルな投稿を作ります。必ずJSON形式のみ返してください：{"posts":["投稿1","投稿2","投稿3"]} 各${lim}文字以内。`
    :`あなたはSNS投稿文の生成AIです。指定キャラになりきりリアルな投稿を作ります。必ずJSON形式のみ返してください：{"posts":["投稿1","投稿2","投稿3"]} 各${lim}文字以内。`;

  const user=`【キャラ設定】
名前:${c.name} 一人称:${c.pron} 年齢:${c.age}
性格:${c.personality} 趣味:${c.hobby} 口調:${c.tone}
シチュエーション:${sit}
プラットフォーム:${plat==='x'?'X(Twitter)（140文字以内）':'Threads（500文字以内）'}${isAdult?'\nアダルト度:'+selAdult:''}
${topic?'テーマ・補足:'+topic:''}

このキャラになりきって3パターン生成。シチュエーションと性格が自然ににじみ出るリアルな投稿にしてください。`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:[{role:'user',content:user}]})
    });
    const data=await res.json();
    const raw=(data.content||[]).map(c=>c.text||'').join('');
    const parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
    genPosts=parsed.posts||[];
    document.getElementById('resultArea').innerHTML=renderResults();
    document.getElementById('resultArea').classList.add('show');
  }catch(e){alert('エラー: '+e.message);}
  finally{[g,r].forEach(b=>{b.disabled=false;b.classList.remove('loading');});}
}

function selChar(i){cur=i;genPosts=[];selSit='';renderSidebar();renderMain();window.scrollTo({top:0,behavior:'smooth'});}
function setPl(p){plat=p;genPosts=[];renderMain();}
function togSit(s){selSit=selSit===s?'':s;renderMain();}
function setAdult(v){selAdult=v;renderMain();}
function cpRes(btn,i){navigator.clipboard.writeText(genPosts[i]).then(()=>{btn.classList.add('copied');btn.textContent='✓ コピー完了';setTimeout(()=>{btn.classList.remove('copied');btn.textContent='📋 コピー';},2000);});}
function useRes(i){const a=document.getElementById('compArea');a.value=genPosts[i];updCount();a.scrollIntoView({behavior:'smooth',block:'center'});}
function updCount(){const a=document.getElementById('compArea'),e=document.getElementById('ccount');if(!a||!e)return;const lim=plat==='x'?140:500,len=a.value.length;e.textContent=`${len} / ${lim}文字`;e.className='ccount'+(len>lim?' over':'');}
function copyPost(){const t=document.getElementById('compArea').value;if(!t.trim()){alert('投稿文を入力してください');return;}const b=document.getElementById('copyBtn');navigator.clipboard.writeText(t).then(()=>{b.classList.add('copied');b.textContent='✓ コピー完了';setTimeout(()=>{b.classList.remove('copied');b.textContent='📋 コピー';},2000);});}
function openX(){const t=document.getElementById('compArea').value;if(!t.trim()){alert('投稿文を入力してください');return;}window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(t)}`,'_blank');}
function copyProfile(){const b=document.getElementById('profBtn');navigator.clipboard.writeText(CHARS[cur].profile).then(()=>{b.classList.add('copied');b.textContent='✓ コピー完了！';setTimeout(()=>{b.classList.remove('copied');b.textContent='📋 プロフィールをコピー';},2000);});}
function savePost(){const t=document.getElementById('compArea').value.trim();if(!t){alert('投稿文を入力してください');return;}const now=new Date(),d=`${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;histories[cur].push({text:t,platform:plat,date:d});renderSidebar();renderHist();}
function reuseP(i){const item=histories[cur][i];if(item.platform!==plat){plat=item.platform;renderMain();}document.getElementById('compArea').value=item.text;updCount();window.scrollTo({top:0,behavior:'smooth'});}
function cpHist(i){navigator.clipboard.writeText(histories[cur][i].text);}
function delP(i){if(!confirm('削除しますか？'))return;histories[cur].splice(i,1);renderSidebar();renderHist();}
function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function esc(s){return s.replace(/'/g,'&#39;');}

renderSidebar();
renderMain();
</script>
</body>
</html>
